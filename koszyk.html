<div class="container">



  <div class="lewa-strona">

    <h2>Dane do zamówienia</h2><br>

    <form id="formularzZamowienia">

      <label>Imię i nazwisko:</label><br>
      <input type="text" id="imie" required><br><br>

      <label>Adres:</label><br>
      <input type="text" id="adres" required><br><br>

      <label>Email:</label><br>
      <input type="email" id="email" required><br><br>

      <label>Sposób dostawy:</label><br>
      <select id="dostawa" onchange="pokazPodsumowanie(); punktOdbioru();">
        <option value="">Wybierz</option>
        <option value="Kurier InPost">Kurier InPost (+ 9zł)</option>
        <option value="Paczkomat InPost">Paczkomat InPost (+ 7zł)</option>
        <option value="Kurier DPD">Kurier DPD (+ 11zł)</option>
        <option value="Punkt ORLEN Paczka">Punkt ORLEN Paczka (+ 8zł)</option>
        <option value="Kurier DHL">Kurier DHL (+ 12zł)</option>
      </select>

      <div id="adresPunktu" style="display:none;">
        <label><br>Adres punktu / paczkomatu:</label><br>
        <input type="text" id="punktOdbioruu"><br><br>
      </div>

      <br>

      <label>Metoda płatności:</label><br>
      <select id="platnosc" required>
        <option value="">Wybierz</option>
        <option value="Przelew">Przelew</option>
        <option value="BLIK">BLIK</option>
        <option value="Karta">Karta</option>
        <option value="Płatność przy odbiorze">Płatność przy odbiorze</option>
      </select>

      <br><br>

      <button type="button" onclick="zlozZamowienie()">Złóż zamówienie</button><br><br>
      <button type="button" onclick="wyczyscKoszyk()">Wyczyść koszyk</button>

    </form>

  </div>



  <div class="prawa-strona">

    <h2>Podsumowanie</h2><br>
    <div id="podsumowanie"></div>
    <div id="cart"></div>

  </div>
